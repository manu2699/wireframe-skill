<!doctype html>
<!-- ============================================================================
     LOW/MID-FIDELITY WIREFRAME — not an implementation, not a design spec.
     Monochrome only: grey boxes + line-art glyphs show layout, IA, and flow.
     Do not infer colors/spacing/visual design from this. data-backend / data-ds
     are the mapping contract; goto/opens/action are the flow contract.

     This file is a THIN SHELL. The agent authors ONLY the JSON in #wf-model.
     The operating layer (header, tabs, comments, approve, navigation, modals)
     is the prebuilt React app wireframe-app.js — copied verbatim, never edited.
     ============================================================================ -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Protoframe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="wireframe.css" />
</head>
<body>
  <!-- SVG filter for sketch mode hand-drawn effect (referenced by CSS filter: url(#wf-sketch-filter)) -->
  <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <defs>
      <filter id="wf-sketch-filter" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="turbulence" baseFrequency="0.02 0.06" numOctaves="3" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div id="wf-root">
    <div id="wf-loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#71717a;background:#f4f4f5">
      <svg width="20" height="20" viewBox="0 0 20 20" style="animation:wf-spin .8s linear infinite">
        <circle cx="10" cy="10" r="8" fill="none" stroke="#d4d4d8" stroke-width="2"/>
        <path d="M10 2a8 8 0 0 1 8 8" fill="none" stroke="#3f3f46" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div style="font-size:13px;font-weight:500">Loading protoframe…</div>
      <style>@keyframes wf-spin{to{transform:rotate(360deg)}}</style>
    </div>
  </div>

  <!-- ── THE WIREFRAME MODEL — this is the only part the agent writes ──
       Schema:
         feature, change, designSource
         screens[] → { id, name, states[] → { id, name, nodes[] } }
         modals[]  → { id, name, nodes[] }
       Node types: box | row | col | grid | table | nav | raw
       Box kinds (monochrome glyphs): kpi, stat, chart:donut, chart:line,
         chart:bars, card, table, list, form, button, tabs, avatar, image
       Flow: goto:"<screenId>"  opens:"<modalId>"  action:"submit|save|…"
       Annotations: backend:"…"  ds:"…" (use "guess: …" when unsure) -->
  <script type="application/json" id="wf-model">
  {
    "feature": "Recycler Overview",
    "change": "EPR recovery dashboard + certificate inventory",
    "designSource": "guess: generic primitives",
    "screens": [
      {
        "id": "s_overview", "name": "Overview",
        "states": [
          { "id": "default", "name": "Default", "nodes": [
            { "type": "row", "children": [
              { "type": "nav", "side": "left", "groups": [
                { "label": "Workflow", "items": [
                  { "text": "Overview", "active": true, "goto": "s_overview" },
                  { "text": "Battery Intake", "goto": "s_intake" },
                  { "text": "Inbox", "badge": 4 }
                ]},
                { "label": "Compliance", "items": [
                  { "text": "EPR Certificates", "goto": "s_certs" },
                  { "text": "CPCB Filing" }
                ]}
              ]},
              { "type": "col", "children": [
                { "type": "grid", "cols": 4, "children": [
                  { "type": "box", "kind": "kpi", "label": "Processed (qtr)", "backend": "GET /recovery/summary" },
                  { "type": "box", "kind": "kpi", "label": "Certificates available", "backend": "GET /certificates?status=available" },
                  { "type": "box", "kind": "kpi", "label": "Avg recovery rate" },
                  { "type": "box", "kind": "kpi", "label": "Active EC alerts", "goto": "s_alerts" }
                ]},
                { "type": "row", "children": [
                  { "type": "col", "children": [
                    { "type": "box", "kind": "chart:bars", "mods": ["tall"], "label": "Recovery vs mandate", "backend": "GET /recovery/by-type", "ds": "guess: BarChart" }
                  ]},
                  { "type": "col", "children": [
                    { "type": "box", "kind": "chart:donut", "mods": ["tall"], "label": "Certificate inventory", "backend": "GET /certificates/inventory", "ds": "guess: DonutChart" }
                  ]}
                ]},
                { "type": "row", "children": [
                  { "type": "col", "children": [
                    { "type": "box", "kind": "chart:line", "label": "Processed quantity trend" }
                  ]},
                  { "type": "col", "children": [
                    { "type": "box", "kind": "card", "label": "Mode A · Collection shortfall", "goto": "s_alerts" }
                  ]}
                ]}
              ]}
            ]}
          ]}
        ]
      },
      {
        "id": "s_intake", "name": "Battery Intake",
        "states": [
          { "id": "default", "name": "Default", "nodes": [
            { "type": "box", "kind": "form", "label": "New intake form", "backend": "POST /intake", "ds": "guess: Form" },
            { "type": "box", "kind": "button", "label": "Submit intake", "action": "submit", "backend": "POST /intake" }
          ]},
          { "id": "empty", "name": "Empty", "nodes": [
            { "type": "box", "mods": ["taller", "placeholder"], "label": "No intakes yet" }
          ]}
        ]
      },
      {
        "id": "s_certs", "name": "EPR Certificates",
        "states": [
          { "id": "default", "name": "Default", "nodes": [
            { "type": "box", "kind": "button", "label": "Issue certificate", "opens": "m_issue" },
            { "type": "table", "headers": ["Certificate", "Type", "Qty (kg)", "Status"],
              "rows": [["—", "—", "—", "—"], ["—", "—", "—", "—"]],
              "backend": "GET /certificates", "ds": "guess: DataGrid" }
          ]}
        ]
      },
      {
        "id": "s_alerts", "name": "Alerts",
        "states": [
          { "id": "default", "name": "Default", "nodes": [
            { "type": "box", "kind": "list", "mods": ["tall"], "label": "EC early-warning alerts", "backend": "GET /alerts" }
          ]}
        ]
      }
    ],
    "modals": [
      { "id": "m_issue", "name": "Issue certificate", "nodes": [
        { "type": "box", "kind": "form", "label": "Issue form", "backend": "POST /certificates", "ds": "guess: Form" },
        { "type": "box", "kind": "button", "label": "Confirm issue", "action": "submit", "backend": "POST /certificates" }
      ]}
    ]
  }
  </script>

  <script src="wireframe-app.js"></script>
</body>
</html>
